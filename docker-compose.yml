services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: mnemo
      POSTGRES_PASSWORD: mnemo
      POSTGRES_DB: mnemo
    ports:
      - "5432:5432"
    volumes:
      - mnemo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mnemo -d mnemo"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Override host to the compose service name; other vars come from .env
      DATABASE_URL: postgresql+psycopg://mnemo:mnemo@db:5432/mnemo
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: >
      sh -c "python -m scripts.init_db &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  mnemo_pgdata:
