services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: tenax
      POSTGRES_PASSWORD: tenax
      POSTGRES_DB: tenax
    ports:
      # Host 5433 -> container 5432 (avoids clashing with a local Postgres on 5432).
      # The app service talks to the db over the compose network on 5432 regardless.
      - "5433:5432"
    volumes:
      - tenax_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tenax -d tenax"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Override host to the compose service name; other vars come from .env
      DATABASE_URL: postgresql+psycopg://tenax:tenax@db:5432/tenax
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: >
      sh -c "python -m scripts.init_db &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  tenax_pgdata:
